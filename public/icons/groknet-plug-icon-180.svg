<svg xmlns="http://www.w3.org/2000/svg" width="180" height="180" viewBox="0 0 180 180" fill="none">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="75%">
      <stop offset="0%" stop-color="#12100e"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="36%" r="50%">
      <stop offset="0%" stop-color="#fb923c" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="plug" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fed7aa"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <filter id="bloom" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="180" height="180" rx="36" fill="url(#bg)"/>
  <rect width="180" height="180" rx="36" fill="#f97316" fill-opacity="0.04"/>
  <ellipse cx="90" cy="72" rx="58" ry="48" fill="url(#glow)"/>

  <!-- Socket -->
  <rect x="54" y="118" width="72" height="28" rx="8" fill="#111113" stroke="#3f3f46" stroke-width="2"/>
  <rect x="64" y="126" width="20" height="12" rx="3" fill="#050505"/>
  <rect x="96" y="126" width="20" height="12" rx="3" fill="#050505"/>

  <!-- Pull trail -->
  <path d="M90 112 V96" stroke="#f97316" stroke-opacity="0.45" stroke-width="3" stroke-linecap="round" filter="url(#bloom)"/>

  <!-- Plug — simplified neural + pull -->
  <g transform="translate(90 78) rotate(-7) translate(-90 -78)" filter="url(#bloom)">
    <g stroke="#f97316" stroke-width="2.8" stroke-linecap="round">
      <line x1="66" y1="42" x2="90" y2="68"/>
      <line x1="114" y1="42" x2="90" y2="68"/>
      <line x1="66" y1="42" x2="114" y2="42"/>
      <line x1="90" y1="68" x2="90" y2="98"/>
    </g>
    <rect x="60" y="34" width="14" height="38" rx="4" fill="url(#plug)"/>
    <rect x="106" y="34" width="14" height="38" rx="4" fill="url(#plug)"/>
    <rect x="72" y="68" width="36" height="34" rx="8" fill="url(#plug)"/>
    <rect x="80" y="76" width="20" height="18" rx="4" fill="#09090b"/>
    <path d="M86 85 H94 M90 81 V89" stroke="#fff7ed" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="66" cy="42" r="4.5" fill="#fb923c"/>
    <circle cx="114" cy="42" r="4.5" fill="#fb923c"/>
    <circle cx="90" cy="68" r="5.5" fill="#fdba74"/>
  </g>

  <circle cx="90" cy="90" r="72" stroke="#f97316" stroke-opacity="0.12" stroke-width="1.5"/>
</svg>