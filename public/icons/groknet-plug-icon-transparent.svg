<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" fill="none">
  <defs>
    <radialGradient id="pullGlow" cx="50%" cy="38%" r="48%">
      <stop offset="0%" stop-color="#fb923c" stop-opacity="0.62"/>
      <stop offset="42%" stop-color="#f97316" stop-opacity="0.24"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nodeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffedd5"/>
      <stop offset="45%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#c2410c"/>
    </radialGradient>
    <linearGradient id="prongGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff7ed"/>
      <stop offset="35%" stop-color="#fdba74"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fdba74"/>
      <stop offset="45%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#9a3412"/>
    </linearGradient>
    <linearGradient id="trailGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
    </linearGradient>
    <filter id="softGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="9" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="nodeBloom" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="circuitGrid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M0 14 H28 M14 0 V28" stroke="#f97316" stroke-opacity="0.07" stroke-width="1"/>
      <path d="M7 7 H11 V11 H7 Z M17 17 H21 V21 H17 Z" stroke="#f97316" stroke-opacity="0.05" stroke-width="0.8" fill="none"/>
      <circle cx="14" cy="14" r="1.2" fill="#f97316" fill-opacity="0.1"/>
    </pattern>
  </defs>

  <rect width="512" height="512" fill="url(#circuitGrid)" opacity="0.7"/>
  <ellipse cx="256" cy="210" rx="150" ry="130" fill="url(#pullGlow)"/>

  <!-- Socket recess (plug being pulled from) -->
  <g opacity="0.92">
    <rect x="176" y="318" width="160" height="72" rx="18" fill="#0a0a0c" stroke="#27272a" stroke-width="3"/>
    <rect x="194" y="334" width="44" height="40" rx="8" fill="#050403" stroke="#3f3f46" stroke-width="2"/>
    <rect x="274" y="334" width="44" height="40" rx="8" fill="#050403" stroke="#3f3f46" stroke-width="2"/>
    <path d="M214 354 H238 M274 354 H298" stroke="#52525b" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Pull trail / neural discharge -->
  <g stroke="url(#trailGrad)" stroke-width="3" stroke-linecap="round" filter="url(#softGlow)">
    <path d="M256 300 C256 286 256 270 256 252" stroke-opacity="0.55"/>
    <path d="M236 292 C228 276 220 258 212 240" stroke-opacity="0.35"/>
    <path d="M276 292 C284 276 292 258 300 240" stroke-opacity="0.35"/>
  </g>

  <!-- Plug assembly — tilted as if being yanked upward -->
  <g transform="translate(256 228) rotate(-8) translate(-256 -228)" filter="url(#softGlow)">
    <g stroke="#f97316" stroke-opacity="0.58" stroke-width="2.5">
      <line x1="206" y1="118" x2="256" y2="196"/>
      <line x1="306" y1="118" x2="256" y2="196"/>
      <line x1="206" y1="118" x2="306" y2="118"/>
      <line x1="206" y1="214" x2="256" y2="196"/>
      <line x1="306" y1="214" x2="256" y2="196"/>
      <line x1="206" y1="214" x2="230" y2="286"/>
      <line x1="306" y1="214" x2="282" y2="286"/>
      <line x1="230" y1="286" x2="282" y2="286"/>
      <line x1="256" y1="196" x2="256" y2="268"/>
      <line x1="182" y1="176" x2="206" y2="214"/>
      <line x1="330" y1="176" x2="306" y2="214"/>
      <line x1="182" y1="176" x2="256" y2="118"/>
      <line x1="330" y1="176" x2="256" y2="118"/>
      <line x1="256" y1="118" x2="256" y2="88"/>
    </g>

    <rect x="188" y="94" width="34" height="124" rx="10" fill="url(#prongGrad)"/>
    <rect x="290" y="94" width="34" height="124" rx="10" fill="url(#prongGrad)"/>
    <rect x="216" y="196" width="80" height="98" rx="20" fill="url(#bodyGrad)"/>
    <rect x="232" y="214" width="48" height="58" rx="12" fill="#09090b" fill-opacity="0.82"/>
    <path d="M248 244 H264 M256 236 V252" stroke="#ffedd5" stroke-width="4.5" stroke-linecap="round"/>

    <g filter="url(#nodeBloom)">
      <circle cx="206" cy="118" r="11" fill="url(#nodeGlow)"/>
      <circle cx="306" cy="118" r="11" fill="url(#nodeGlow)"/>
      <circle cx="256" cy="88" r="10" fill="url(#nodeGlow)"/>
      <circle cx="256" cy="196" r="14" fill="url(#nodeGlow)"/>
      <circle cx="206" cy="214" r="9" fill="url(#nodeGlow)"/>
      <circle cx="306" cy="214" r="9" fill="url(#nodeGlow)"/>
      <circle cx="230" cy="286" r="9" fill="url(#nodeGlow)"/>
      <circle cx="282" cy="286" r="9" fill="url(#nodeGlow)"/>
      <circle cx="182" cy="176" r="8" fill="url(#nodeGlow)" fill-opacity="0.9"/>
      <circle cx="330" cy="176" r="8" fill="url(#nodeGlow)" fill-opacity="0.9"/>
    </g>
  </g>

  <!-- Pull motion arcs -->
  <path d="M196 96 C210 72 236 58 256 52 C276 58 302 72 316 96" stroke="#fb923c" stroke-opacity="0.22" stroke-width="2" fill="none"/>
  <circle cx="256" cy="256" r="188" stroke="#f97316" stroke-opacity="0.14" stroke-width="2"/>
</svg>